server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /vps-data/ {
        add_header Cache-Control "public, max-age=86400";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
