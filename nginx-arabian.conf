server {
    listen 80;
    server_name 72.62.92.16 arabian.thedealmaker.xyz estate.thedealmaker.xyz elite.thedealmaker.xyz;
    root /var/www/html;
    index index.html;

    # Elite Homes at /elite-homes/
    location /elite-homes {
        alias /var/www/html/elite-homes;
        try_files $uri $uri/ /elite-homes/index.html;
    }

    # API proxy (listings backend)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /images/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Arabian Estate (default)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /vps-data/ {
        add_header Cache-Control "public, max-age=86400";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
